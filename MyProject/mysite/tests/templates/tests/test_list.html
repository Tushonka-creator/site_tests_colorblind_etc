<!doctype html>
<html>
<head><meta charset="utf-8"><title>Тесты</title></head>
<body>
  <h1>Тесты</h1>
  <ul>
    {% for t in tests %}
      <li>
        <a href="{% url 'tests:detail' slug=t.slug %}">{{ t.title }}</a>
        {% if t.description %}<div>{{ t.description }}</div>{% endif %}
      </li>
    {% empty %}
      <li>Пока нет опубликованных тестов</li>
    {% endfor %}
  </ul>
</body>
</html>
